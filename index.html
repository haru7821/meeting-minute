<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meeting Minutes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:16px 16px 48px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:0.5px solid #e0e0e0}
h1{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.sub{font-size:13px;color:#888}
h2{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type=text],input[type=password],textarea{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none}
input:focus,textarea:focus{border-color:#555;background:#fff}
textarea{resize:vertical;line-height:1.6}
.date-val{padding:10px 12px;background:#f0f0f0;border-radius:10px;font-size:15px;color:#555}

.api-row{display:flex;gap:8px}
.api-row input{flex:1}
.api-save{padding:10px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;white-space:nowrap}
.api-ok{font-size:12px;color:#27ae60;margin-top:6px;display:none}
.api-steps{background:#f0f7ff;border-radius:10px;padding:12px 14px;margin-top:10px;font-size:13px;color:#333;line-height:1.8}
.api-steps a{color:#1a6fa8}

.rec-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:4px 0 8px}
.rec-btn{width:78px;height:78px;border-radius:50%;border:none;background:#e74c3c;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rec-btn.on{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 16px rgba(231,76,60,0)}}
.rec-label{font-size:13px;color:#888;text-align:center}
.rec-timer{font-size:26px;font-weight:600;color:#e74c3c;font-variant-numeric:tabular-nums}

.live-box{background:#fafafa;border:0.5px solid #ddd;border-radius:10px;padding:12px;min-height:80px;font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;margin-top:6px}
.live-box.on{border-color:#e74c3c;background:#fff9f9}
.interim{color:#bbb}
audio{width:100%;border-radius:10px;margin-top:8px}

.btn-main{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:10px}
.btn-main:disabled{background:#ccc;cursor:not-allowed}
.btn-ghost{width:100%;padding:10px;border:0.5px dashed #ccc;background:none;border-radius:10px;font-size:13px;color:#999;cursor:pointer;margin-top:6px}
.action-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.action-row input{flex:1}
.del-btn{width:34px;height:34px;min-width:34px;border:0.5px solid #eee;background:#fff;border-radius:8px;font-size:18px;cursor:pointer;color:#e74c3c;display:flex;align-items:center;justify-content:center}
.btn-pdf{width:100%;padding:14px;background:#2c3e50;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-kakao{width:100%;padding:14px;background:#fee500;color:#3c1e1e;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}

.spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;margin-left:6px}
.badge-ko{background:#e8f4fd;color:#1a6fa8}
.badge-en{background:#e8fdf0;color:#1a7a4a}
.hint{font-size:12px;color:#aaa;margin-top:5px;text-align:center}
.err-box{font-size:12px;color:#c0392b;margin-top:8px;padding:8px 12px;background:#fff5f5;border-radius:8px;border:0.5px solid #f5c6c6;display:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sec{margin-bottom:14px}
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h1>Meeting Minutes</h1>
    <p class="sub">녹음 → 텍스트 변환 → AI 회의록 자동 생성</p>
  </div>



  <!-- 기본 정보 -->
  <div class="card">
    <h2>기본 정보</h2>
    <label>회의 이름</label>
    <input type="text" id="meetingTitle" value="TS LT Meeting">
    <label>날짜</label>
    <div class="date-val" id="meetingDate"></div>
    <label>참석자 (쉼표로 구분)</label>
    <input type="text" id="attendees" placeholder="예: 홍길동, Kim Jisu, Park Suho">
  </div>

  <!-- 녹음 -->
  <div class="card">
    <h2>녹음 &amp; 실시간 텍스트 변환</h2>
    <div class="rec-wrap">
      <button class="rec-btn" id="recBtn" onclick="toggleRec()">&#9679;</button>
      <div class="rec-label" id="recLabel">버튼을 눌러 녹음 시작</div>
      <div class="rec-timer" id="recTimer">00:00</div>
    </div>
    <label>인식된 텍스트 <span id="sttState" style="color:#e74c3c;font-size:11px"></span></label>
    <div class="live-box" id="liveBox">녹음을 시작하면 여기에 텍스트가 표시됩니다.</div>
    <div id="audioWrap" style="display:none"><audio id="audioEl" controls></audio></div>
    <div class="err-box" id="errBox"></div>
    <p class="hint" id="recHint">* 아이폰 Safari 지원 | 마이크 권한 허용 필요</p>
    <button class="btn-main" id="aiBtn" disabled onclick="runAI('stt')">AI로 회의록 만들기</button>
  </div>

  <!-- 직접 입력 -->
  <div class="card">
    <h2>또는 직접 입력</h2>
    <p class="sub" style="margin-bottom:10px">음성인식이 안 될 때 내용을 직접 붙여넣으세요</p>
    <textarea id="manualText" rows="5" placeholder="회의 내용, 결정 사항, action items 등 자유롭게 입력..."></textarea>
    <button class="btn-main" onclick="runAI('manual')">AI로 회의록 만들기</button>
  </div>

  <!-- 로딩 -->
  <div class="card" id="loadCard" style="display:none">
    <div style="text-align:center;padding:12px">
      <div class="spinner"></div>
      <p style="color:#888;font-size:14px">Gemini AI가 회의 내용을 분석 중...</p>
    </div>
  </div>

  <!-- 편집 -->
  <div class="card" id="editCard" style="display:none">
    <h2>회의록 편집 <span class="badge" id="langBadge"></span></h2>
    <div class="sec">
      <label>회의 목적</label>
      <textarea id="purpose" rows="2"></textarea>
    </div>
    <div class="sec">
      <label>주요 논의 내용</label>
      <textarea id="discussion" rows="5"></textarea>
    </div>
    <div class="sec">
      <label>결정 사항</label>
      <textarea id="decisions" rows="3"></textarea>
    </div>
    <div class="sec">
      <label>Action Items</label>
      <div id="actionList"></div>
      <button class="btn-ghost" onclick="addAction()">+ Action Item 추가</button>
    </div>
    <div class="sec">
      <label>다음 회의 일정</label>
      <input type="text" id="nextMeeting" placeholder="예: 2025년 4월 5일 14:00">
    </div>
  </div>

  <!-- 내보내기 -->
  <div class="card" id="exportCard" style="display:none">
    <h2>내보내기</h2>
    <button class="btn-pdf" onclick="exportPDF()">PDF로 저장하기</button>
    <button class="btn-kakao" onclick="shareKakao()">카카오톡으로 공유하기</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ── 날짜 ── */
document.getElementById('meetingDate').textContent =
  new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

/* ── API Key (코드에 직접 삽입) ── */
const GEMINI_API_KEY = 'gen-lang-client-0593944636';
function getKey(){ return GEMINI_API_KEY; }

/* ── 녹음 + STT ── */
let mediaRecorder,audioChunks=[],recTimer,recSecs=0,recOn=false;
let recognition=null,sttOn=false;
let finalText='',interimText='';
const pad=n=>String(n).padStart(2,'0');

async function toggleRec(){ recOn?stopRec():await startRec(); }

async function startRec(){
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ showErr('마이크 권한이 필요합니다: '+e.message); return; }

  audioChunks=[];
  const mime=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'';
  try{ mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:{}); }
  catch(e){ mediaRecorder=new MediaRecorder(stream); }
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
  mediaRecorder.onstop=()=>{
    const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    document.getElementById('audioEl').src=URL.createObjectURL(blob);
    document.getElementById('audioWrap').style.display='block';
    stream.getTracks().forEach(t=>t.stop());
  };
  mediaRecorder.start(500);

  finalText=''; interimText='';
  startSTT();

  recOn=true; recSecs=0;
  document.getElementById('recBtn').classList.add('on');
  document.getElementById('recBtn').innerHTML='&#9632;';
  document.getElementById('recLabel').textContent='녹음 중... 버튼을 눌러 중지';
  document.getElementById('liveBox').classList.add('on');
  document.getElementById('liveBox').textContent='듣고 있습니다...';
  recTimer=setInterval(()=>{
    recSecs++;
    document.getElementById('recTimer').textContent=pad(Math.floor(recSecs/60))+':'+pad(recSecs%60);
  },1000);
}

function stopRec(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  stopSTT();
  recOn=false;
  clearInterval(recTimer);
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recBtn').innerHTML='&#9679;';
  document.getElementById('recLabel').textContent='녹음 완료';
  document.getElementById('liveBox').classList.remove('on');
  const has=finalText.trim().length>0;
  document.getElementById('aiBtn').disabled=!has;
  document.getElementById('recHint').textContent=has
    ?'"AI로 회의록 만들기" 버튼을 누르세요!'
    :'텍스트가 인식되지 않았습니다. 아래 직접 입력을 이용해주세요.';
}

function startSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showErr('음성인식 미지원 브라우저입니다. 직접 입력을 이용해주세요.'); return; }
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang=navigator.language?.startsWith('en')?'en-US':'ko-KR';
  recognition.onstart=()=>{ document.getElementById('sttState').textContent='● 인식 중'; };
  recognition.onresult=e=>{
    interimText='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText+=e.results[i][0].transcript+' ';
      else interimText+=e.results[i][0].transcript;
    }
    const box=document.getElementById('liveBox');
    box.innerHTML=finalText+(interimText?`<span class="interim">${interimText}</span>`:'');
  };
  recognition.onerror=ev=>{ if(ev.error==='no-speech') return; showErr('음성인식 오류: '+ev.error); };
  recognition.onend=()=>{ if(recOn) recognition.start(); };
  recognition.start();
  sttOn=true;
}

function stopSTT(){
  if(recognition){ try{recognition.stop();}catch(e){} }
  sttOn=false;
  document.getElementById('sttState').textContent='';
}

/* ── Gemini AI 호출 ── */
async function runAI(src){
  const key=getKey();
  if(!key){ showToast('Gemini API 키를 먼저 입력해주세요'); document.getElementById('apiKey').focus(); return; }

  const text=src==='manual'
    ?document.getElementById('manualText').value.trim()
    :finalText.trim();
  if(!text){ showToast('변환할 텍스트가 없습니다'); return; }

  const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date=document.getElementById('meetingDate').textContent;
  const att=document.getElementById('attendees').value||'(not specified)';

  document.getElementById('loadCard').style.display='block';
  document.getElementById('editCard').style.display='none';
  document.getElementById('exportCard').style.display='none';
  document.getElementById('errBox').style.display='none';

  const prompt=`Structure this meeting transcript into professional meeting minutes.

Meeting info:
- Title: ${title}
- Date: ${date}
- Attendees: ${att}

Transcript:
${text}

Reply ONLY with valid JSON, no markdown, no explanation:
{"language":"Korean or English","purpose":"...","discussion":"...","decisions":"...","actions":[{"task":"...","owner":"...","due":"..."}],"nextMeeting":"..."}

Use the same language as the transcript.`;

  try{
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
    const resp=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.3,maxOutputTokens:1500}
      })
    });

    if(!resp.ok){
      const err=await resp.json();
      throw new Error(err?.error?.message||`HTTP ${resp.status}`);
    }

    const data=await resp.json();
    const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    let p;
    try{ p=JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch{ p={language:'Korean',purpose:'',discussion:raw,decisions:'',actions:[],nextMeeting:''}; }

    fillForm(p);
    document.getElementById('loadCard').style.display='none';
    document.getElementById('editCard').style.display='block';
    document.getElementById('exportCard').style.display='block';
    showToast('회의록 생성 완료!');
  }catch(e){
    document.getElementById('loadCard').style.display='none';
    showErr('API 오류: '+e.message);
  }
}

function fillForm(p){
  const isEn=(p.language||'').toLowerCase().includes('en');
  const b=document.getElementById('langBadge');
  b.textContent=isEn?'English':'한국어';
  b.className='badge '+(isEn?'badge-en':'badge-ko');
  document.getElementById('purpose').value=p.purpose||'';
  document.getElementById('discussion').value=p.discussion||'';
  document.getElementById('decisions').value=p.decisions||'';
  document.getElementById('nextMeeting').value=p.nextMeeting||'';
  const list=document.getElementById('actionList');
  list.innerHTML='';
  const acts=p.actions||[];
  if(!acts.length) acts.push({task:'',owner:'',due:''});
  acts.forEach(a=>{
    const v=[a.task,a.owner?`(${a.owner})`:'',a.due?`→ ${a.due}`:''].filter(Boolean).join(' ');
    addAction(v);
  });
}

function addAction(val=''){
  const d=document.createElement('div');
  d.className='action-row';
  d.innerHTML=`<input type="text" placeholder="내용 | 담당자 | 기한" value="${val.replace(/"/g,'&quot;')}"><button class="del-btn" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('actionList').appendChild(d);
}

/* ── PDF ── */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date=document.getElementById('meetingDate').textContent;
  const att=document.getElementById('attendees').value||'—';
  const purpose=document.getElementById('purpose').value||'—';
  const disc=document.getElementById('discussion').value||'—';
  const dec=document.getElementById('decisions').value||'—';
  const next=document.getElementById('nextMeeting').value||'—';
  const acts=Array.from(document.querySelectorAll('#actionList input')).map(i=>i.value).filter(Boolean);

  const M=20,U=170;let y=M;
  doc.setFillColor(44,62,80);doc.rect(0,0,210,36,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text(title,M,15);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(date,M,23);doc.text('Attendees: '+att,M,30);
  y=44;

  const sec=(h,c)=>{
    if(y>264){doc.addPage();y=M;}
    doc.setFillColor(240,242,245);doc.rect(M,y,U,8,'F');
    doc.setTextColor(44,62,80);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(h,M+3,y+5.5);y+=11;
    doc.setTextColor(50,50,50);doc.setFontSize(9.5);doc.setFont('helvetica','normal');
    doc.splitTextToSize(c,U-4).forEach(l=>{
      if(y>278){doc.addPage();y=M;}
      doc.text(l,M+3,y);y+=5.2;
    });
    y+=4;
  };
  sec('Meeting Purpose',purpose);
  sec('Key Discussion',disc);
  sec('Decisions',dec);
  sec('Action Items',acts.length?acts.map((a,i)=>`${i+1}. ${a}`).join('\n'):'—');
  sec('Next Meeting',next);
  doc.setTextColor(190,190,190);doc.setFontSize(8);
  doc.text('Generated by Meeting Minutes Tool',M,290);
  doc.save(title.replace(/\s+/g,'_')+'_minutes.pdf');
  showToast('PDF 저장 완료!');
}

function shareKakao(){
  exportPDF();
  setTimeout(()=>{
    const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
    if(navigator.share){
      navigator.share({
        title:title+' Meeting Minutes',
        text:`[${title}] 회의록\n날짜: ${document.getElementById('meetingDate').textContent}\n참석자: ${document.getElementById('attendees').value||'—'}`
      }).catch(()=>showToast('PDF 저장 후 카카오톡에서 공유하세요'));
    }else{ showToast('PDF 저장 완료! 카카오톡에서 파일을 공유하세요'); }
  },600);
}

function showErr(msg){
  const el=document.getElementById('errBox');
  el.textContent=msg;el.style.display='block';
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
