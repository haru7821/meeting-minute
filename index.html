<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meeting Minutes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:16px}
.header{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:0.5px solid #e0e0e0}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.header p{font-size:13px;color:#888}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:0.5px solid #e0e0e0}
.card h2{font-size:13px;font-weight:600;color:#666;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px}
label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type="text"],textarea{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none;transition:border 0.2s}
input[type="text"]:focus,textarea:focus{border-color:#555;background:#fff}
textarea{resize:vertical;line-height:1.6}
.date-display{padding:10px 12px;background:#f0f0f0;border-radius:10px;font-size:15px;color:#555}

/* 녹음 */
.rec-center{display:flex;flex-direction:column;align-items:center;gap:10px}
.rec-btn{width:76px;height:76px;border-radius:50%;border:none;background:#e74c3c;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.rec-btn:active{transform:scale(0.94)}
.rec-btn.recording{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 14px rgba(231,76,60,0)}}
.rec-status{font-size:13px;color:#888;text-align:center}
.rec-timer{font-size:26px;font-weight:600;color:#e74c3c;font-variant-numeric:tabular-nums}
audio{width:100%;border-radius:10px;margin-top:10px}

/* 음성인식 */
.stt-box{background:#fafafa;border:0.5px solid #ddd;border-radius:10px;padding:12px;min-height:80px;font-size:14px;line-height:1.7;color:#333;margin-top:10px;white-space:pre-wrap;word-break:break-word}
.stt-box.listening{border-color:#e74c3c;background:#fff9f9}
.stt-hint{font-size:12px;color:#aaa;margin-top:6px}

/* 버튼들 */
.btn-primary{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:10px;transition:background .2s}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#bbb;cursor:not-allowed}
.btn-outline{width:100%;padding:11px;border:0.5px solid #ccc;background:#fff;border-radius:10px;font-size:14px;color:#555;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-outline:hover{background:#f5f5f5}

/* 편집 */
.action-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.action-row input{flex:1}
.del-btn{width:34px;height:34px;min-width:34px;border:0.5px solid #eee;background:#fff;border-radius:8px;font-size:18px;cursor:pointer;color:#e74c3c;display:flex;align-items:center;justify-content:center}
.add-btn{width:100%;padding:10px;border:0.5px dashed #ccc;background:transparent;border-radius:10px;font-size:13px;color:#999;cursor:pointer}
.add-btn:hover{background:#f5f5f5}

/* 내보내기 */
.export-btn{width:100%;padding:15px;background:#2c3e50;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.share-btn{width:100%;padding:15px;background:#fee500;color:#3c1e1e;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}

/* 로딩 */
.spinner{width:34px;height:34px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 탭 */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px;border:0.5px solid #ddd;border-radius:10px;background:#fafafa;font-size:13px;color:#888;cursor:pointer;text-align:center}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.lang-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:#e8f4fd;color:#1a6fa8;margin-left:6px}
.section-group{margin-bottom:14px}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Meeting Minutes</h1>
    <p>녹음 + 음성인식 → AI 구조화 → PDF 저장</p>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <h2>기본 정보</h2>
    <label>회의 이름</label>
    <input type="text" id="meetingTitle" value="TS LT Meeting">
    <label>날짜</label>
    <div class="date-display" id="meetingDate"></div>
    <label>참석자 (쉼표로 구분)</label>
    <input type="text" id="attendees" placeholder="예: 홍길동, Kim Jisu, Park Suho">
  </div>

  <!-- 녹음 + 음성인식 -->
  <div class="card">
    <h2>녹음 &amp; 텍스트 변환</h2>

    <div class="tabs">
      <div class="tab active" id="tabRec" onclick="switchTab('rec')">녹음</div>
      <div class="tab" id="tabStt" onclick="switchTab('stt')">실시간 음성인식</div>
      <div class="tab" id="tabText" onclick="switchTab('text')">직접 입력</div>
    </div>

    <!-- 녹음 탭 -->
    <div id="panelRec">
      <div class="rec-center">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()">&#9679;</button>
        <div class="rec-status" id="recStatus">버튼을 눌러 녹음 시작</div>
        <div class="rec-timer" id="recTimer">00:00</div>
      </div>
      <audio id="audioElem" controls style="display:none"></audio>
      <button class="btn-primary" id="transcribeBtn" style="display:none" onclick="structureText()">AI로 회의록 구조화하기</button>
    </div>

    <!-- 실시간 음성인식 탭 -->
    <div id="panelStt" style="display:none">
      <button class="btn-outline" id="sttBtn" onclick="toggleSTT()">음성인식 시작</button>
      <div class="stt-box" id="sttBox">여기에 인식된 텍스트가 표시됩니다...</div>
      <div class="stt-hint">* 한국어/영어 자동 감지 | Safari(아이폰) 지원</div>
      <button class="btn-primary" onclick="structureText()">AI로 회의록 구조화하기</button>
    </div>

    <!-- 직접 입력 탭 -->
    <div id="panelText" style="display:none">
      <label>회의 내용을 자유롭게 입력하세요</label>
      <textarea id="manualText" rows="7" placeholder="회의에서 논의된 내용, 결정 사항, action items 등을 자유롭게 입력하면 AI가 자동으로 정리해드립니다."></textarea>
      <button class="btn-primary" onclick="structureText()">AI로 회의록 구조화하기</button>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="card" id="loadingCard" style="display:none">
    <div style="text-align:center;padding:16px">
      <div class="spinner"></div>
      <p style="color:#888;font-size:14px">AI가 회의 내용을 분석 중입니다...</p>
    </div>
  </div>

  <!-- 편집 -->
  <div class="card" id="minutesCard" style="display:none">
    <h2>회의록 편집 <span class="lang-badge" id="langBadge"></span></h2>

    <div class="section-group">
      <label>회의 목적</label>
      <textarea id="purpose" rows="2" placeholder="회의 목적"></textarea>
    </div>
    <div class="section-group">
      <label>주요 논의 내용</label>
      <textarea id="discussion" rows="5" placeholder="주요 논의 내용"></textarea>
    </div>
    <div class="section-group">
      <label>결정 사항</label>
      <textarea id="decisions" rows="3" placeholder="결정된 내용"></textarea>
    </div>
    <div class="section-group">
      <label>Action Items</label>
      <div id="actionList"></div>
      <button class="add-btn" onclick="addAction()">+ Action Item 추가</button>
    </div>
    <div class="section-group">
      <label>다음 회의 일정</label>
      <input type="text" id="nextMeeting" placeholder="예: 2025년 4월 5일 14:00">
    </div>
  </div>

  <!-- 내보내기 -->
  <div class="card" id="exportCard" style="display:none">
    <h2>내보내기</h2>
    <button class="export-btn" onclick="exportPDF()">PDF로 저장하기</button>
    <button class="share-btn" onclick="shareKakao()">카카오톡으로 공유하기</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ── 날짜 ── */
const today = new Date();
document.getElementById('meetingDate').textContent =
  today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

/* ── 탭 ── */
let curTab = 'rec';
function switchTab(t){
  ['rec','stt','text'].forEach(k=>{
    document.getElementById('panel'+k.charAt(0).toUpperCase()+k.slice(1)).style.display = k===t?'block':'none';
    document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1)).className = 'tab'+(k===t?' active':'');
  });
  curTab = t;
}

/* ── 공통 텍스트 수집 ── */
function getRawText(){
  if(curTab==='rec') return document.getElementById('sttTranscript')||'';
  if(curTab==='stt') return document.getElementById('sttBox').textContent.trim();
  return document.getElementById('manualText').value.trim();
}

/* ── 녹음 ── */
let mediaRecorder, audioChunks=[], isRecording=false, timerInt, secs=0;
let sttTranscript='';

function pad(n){return String(n).padStart(2,'0')}

async function toggleRecord(){
  if(!isRecording) await startRecord(); else stopRecord();
}

async function startRecord(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    mediaRecorder = new MediaRecorder(stream, {mimeType: getSupportedMime()});
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType});
      const url = URL.createObjectURL(blob);
      const ae = document.getElementById('audioElem');
      ae.src = url; ae.style.display='block';
      document.getElementById('transcribeBtn').style.display='block';
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start(500);
    isRecording=true; secs=0;
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recBtn').innerHTML='&#9632;';
    document.getElementById('recStatus').textContent='녹음 중... (버튼을 눌러 중지)';
    timerInt = setInterval(()=>{
      secs++;
      document.getElementById('recTimer').textContent=pad(Math.floor(secs/60))+':'+pad(secs%60);
    },1000);
  }catch(e){
    showToast('마이크 권한이 필요합니다');
  }
}

function stopRecord(){
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  isRecording=false;
  clearInterval(timerInt);
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recBtn').innerHTML='&#9679;';
  document.getElementById('recStatus').textContent='녹음 완료. 재생하거나 아래에서 내용을 입력해 변환하세요.';
}

function getSupportedMime(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for(const t of types){ if(MediaRecorder.isTypeSupported(t)) return t; }
  return '';
}

/* ── 실시간 음성인식 (Web Speech API) ── */
let recognition=null, sttRunning=false, sttFull='';

function toggleSTT(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast('이 브라우저는 음성인식을 지원하지 않습니다 (Safari 권장)');
    return;
  }
  if(!sttRunning) startSTT(); else stopSTT();
}

function startSTT(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang=''; // 자동 감지
  const box = document.getElementById('sttBox');
  box.classList.add('listening');
  let interim='';
  recognition.onresult = e=>{
    interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) sttFull+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    box.textContent = sttFull + interim;
  };
  recognition.onerror = ()=>{ stopSTT(); showToast('음성인식 오류. 다시 시도해주세요.'); };
  recognition.onend = ()=>{ if(sttRunning) recognition.start(); };
  recognition.start();
  sttRunning=true;
  document.getElementById('sttBtn').textContent='음성인식 중지';
}

function stopSTT(){
  if(recognition) recognition.stop();
  sttRunning=false;
  document.getElementById('sttBox').classList.remove('listening');
  document.getElementById('sttBtn').textContent='음성인식 시작';
}

/* ── AI 구조화 ── */
async function structureText(){
  let raw = '';
  if(curTab==='rec'){
    // 녹음 탭에서는 수동 입력 받기
    raw = prompt('녹음 내용을 텍스트로 입력해주세요 (또는 "직접 입력" 탭을 이용하세요):');
    if(!raw) return;
  } else if(curTab==='stt'){
    raw = document.getElementById('sttBox').textContent.trim();
    if(!raw || raw.startsWith('여기에')) { showToast('먼저 음성인식으로 내용을 입력해주세요'); return; }
  } else {
    raw = document.getElementById('manualText').value.trim();
    if(!raw){ showToast('내용을 입력해주세요'); return; }
  }

  const title = document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date = document.getElementById('meetingDate').textContent;
  const attendees = document.getElementById('attendees').value||'';

  document.getElementById('loadingCard').style.display='block';
  document.getElementById('minutesCard').style.display='none';
  document.getElementById('exportCard').style.display='none';

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        messages:[{role:'user',content:`You are a professional meeting minutes assistant. Structure the following meeting notes into a clean meeting minutes format.

Meeting info:
- Title: ${title}
- Date: ${date}
- Attendees: ${attendees}

Raw meeting notes:
${raw}

Respond ONLY in valid JSON (no markdown, no backticks):
{
  "language": "Korean or English",
  "purpose": "...",
  "discussion": "...",
  "decisions": "...",
  "actions": [{"task":"...","owner":"...","due":"..."}],
  "nextMeeting": "..."
}

Write all content in the same language as the meeting notes. Be concise and professional.`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text||'';
    let parsed;
    try{
      parsed = JSON.parse(txt.replace(/```json|```/g,'').trim());
    }catch{
      parsed={language:'Korean',purpose:'',discussion:txt,decisions:'',actions:[],nextMeeting:''};
    }

    document.getElementById('langBadge').textContent = parsed.language==='English'?'English':'한국어';
    document.getElementById('purpose').value = parsed.purpose||'';
    document.getElementById('discussion').value = parsed.discussion||'';
    document.getElementById('decisions').value = parsed.decisions||'';
    document.getElementById('nextMeeting').value = parsed.nextMeeting||'';
    document.getElementById('actionList').innerHTML='';
    const acts = parsed.actions||[];
    if(!acts.length) acts.push({task:'',owner:'',due:''});
    acts.forEach(a=>addAction([a.task,a.owner,a.due].filter(Boolean).join(' | ')));

    document.getElementById('loadingCard').style.display='none';
    document.getElementById('minutesCard').style.display='block';
    document.getElementById('exportCard').style.display='block';
    showToast('구조화 완료! 내용을 확인 후 편집하세요.');
  }catch(e){
    document.getElementById('loadingCard').style.display='none';
    showToast('오류 발생. 다시 시도해주세요.');
  }
}

/* ── Action Items ── */
function addAction(val=''){
  const div=document.createElement('div');
  div.className='action-row';
  div.innerHTML=`<input type="text" placeholder="담당자 | 내용 | 기한" value="${val.replace(/"/g,'&quot;')}"><button class="del-btn" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('actionList').appendChild(div);
}

/* ── PDF 내보내기 ── */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date=document.getElementById('meetingDate').textContent;
  const attendees=document.getElementById('attendees').value||'—';
  const purpose=document.getElementById('purpose').value||'—';
  const discussion=document.getElementById('discussion').value||'—';
  const decisions=document.getElementById('decisions').value||'—';
  const nextMeeting=document.getElementById('nextMeeting').value||'—';
  const actions=Array.from(document.querySelectorAll('#actionList input')).map(i=>i.value).filter(Boolean);

  const M=20, W=210, U=W-M*2;
  let y=M;

  doc.setFillColor(44,62,80);
  doc.rect(0,0,210,34,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text(title,M,15);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(date,M,22);
  doc.text('Attendees: '+attendees,M,28);
  y=42;

  function section(heading,content){
    if(y>262){doc.addPage();y=M;}
    doc.setFillColor(240,242,245);
    doc.rect(M,y,U,8,'F');
    doc.setTextColor(44,62,80); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text(heading,M+3,y+5.5);
    y+=11;
    doc.setTextColor(60,60,60); doc.setFontSize(9.5); doc.setFont('helvetica','normal');
    const lines=doc.splitTextToSize(content,U-4);
    lines.forEach(l=>{
      if(y>278){doc.addPage();y=M;}
      doc.text(l,M+3,y); y+=5.2;
    });
    y+=4;
  }

  section('Meeting Purpose',purpose);
  section('Key Discussion',discussion);
  section('Decisions',decisions);
  section('Action Items',actions.length?actions.map((a,i)=>`${i+1}. ${a}`).join('\n'):'—');
  section('Next Meeting',nextMeeting);

  doc.setTextColor(180,180,180); doc.setFontSize(8);
  doc.text('Generated by Meeting Minutes Tool',M,290);

  doc.save(title.replace(/\s+/g,'_')+'_minutes.pdf');
  showToast('PDF가 저장되었습니다!');
  return doc.output('datauristring');
}

function shareKakao(){
  exportPDF();
  setTimeout(()=>{
    if(navigator.share){
      const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
      navigator.share({
        title:title+' Meeting Minutes',
        text:`[${title}] 회의록\n날짜: ${document.getElementById('meetingDate').textContent}\n참석자: ${document.getElementById('attendees').value||'—'}`
      }).catch(()=>showToast('PDF를 저장 후 카카오톡에서 직접 공유해주세요.'));
    }else{
      showToast('PDF 저장 완료! 카카오톡에서 파일을 공유하세요.');
    }
  },600);
}

/* ── Toast ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
