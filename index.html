<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meeting Minutes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:16px 16px 40px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:0.5px solid #e0e0e0}
h1{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.sub{font-size:13px;color:#888}
h2{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type=text],textarea{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none}
input[type=text]:focus,textarea:focus{border-color:#555;background:#fff}
textarea{resize:vertical;line-height:1.6}
.date-val{padding:10px 12px;background:#f0f0f0;border-radius:10px;font-size:15px;color:#555}

/* 녹음 UI */
.rec-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
.rec-btn{width:80px;height:80px;border-radius:50%;border:none;background:#e74c3c;color:#fff;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;flex-shrink:0}
.rec-btn:active{transform:scale(.93)}
.rec-btn.on{animation:pulse 1.4s infinite}
.rec-btn:disabled{background:#ccc;cursor:not-allowed}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 16px rgba(231,76,60,0)}}
.rec-label{font-size:13px;color:#888;text-align:center}
.rec-timer{font-size:28px;font-weight:600;color:#e74c3c;font-variant-numeric:tabular-nums}

/* 실시간 텍스트 */
.live-box{background:#fafafa;border:0.5px solid #ddd;border-radius:10px;padding:12px;min-height:90px;font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;margin-top:4px}
.live-box.active{border-color:#e74c3c;background:#fff9f9}
.interim{color:#aaa}

audio{width:100%;border-radius:10px;margin-top:8px}

/* 버튼 */
.btn-main{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-main:disabled{background:#ccc;cursor:not-allowed}
.btn-ghost{width:100%;padding:10px;border:0.5px dashed #ccc;background:none;border-radius:10px;font-size:13px;color:#999;cursor:pointer;margin-top:6px}
.btn-ghost:hover{background:#f5f5f5}
.del-btn{width:34px;height:34px;min-width:34px;border:0.5px solid #eee;background:#fff;border-radius:8px;font-size:18px;cursor:pointer;color:#e74c3c;display:flex;align-items:center;justify-content:center}
.action-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.action-row input{flex:1}

/* 내보내기 */
.btn-pdf{width:100%;padding:15px;background:#2c3e50;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-kakao{width:100%;padding:15px;background:#fee500;color:#3c1e1e;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}

/* 상태 뱃지 */
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500;margin-left:6px}
.badge-ko{background:#e8f4fd;color:#1a6fa8}
.badge-en{background:#e8fdf0;color:#1a7a4a}

/* 스피너 */
.spinner{width:34px;height:34px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

.step-hint{font-size:12px;color:#aaa;text-align:center;margin-top:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.section-group{margin-bottom:14px}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="card">
    <h1>Meeting Minutes</h1>
    <p class="sub">녹음하면 자동으로 텍스트 변환 → AI 회의록 생성</p>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <h2>기본 정보</h2>
    <label>회의 이름</label>
    <input type="text" id="meetingTitle" value="TS LT Meeting">
    <label>날짜</label>
    <div class="date-val" id="meetingDate"></div>
    <label>참석자 (쉼표로 구분)</label>
    <input type="text" id="attendees" placeholder="예: 홍길동, Kim Jisu, Park Suho">
  </div>

  <!-- 녹음 -->
  <div class="card">
    <h2>녹음 &amp; 실시간 텍스트 변환</h2>
    <div class="rec-wrap">
      <button class="rec-btn" id="recBtn" onclick="toggleRec()">&#9679;</button>
      <div class="rec-label" id="recLabel">버튼을 눌러 녹음 시작</div>
      <div class="rec-timer" id="recTimer">00:00</div>
    </div>
    <div style="margin-top:12px">
      <label>인식된 텍스트 <span id="sttState"></span></label>
      <div class="live-box" id="liveBox">녹음을 시작하면 여기에 텍스트가 표시됩니다.</div>
    </div>
    <div id="audioWrap" style="display:none">
      <audio id="audioEl" controls></audio>
    </div>
    <p class="step-hint" id="stepHint">* 아이폰 Safari에서 마이크 권한을 허용해주세요</p>
    <button class="btn-main" id="aiBtn" onclick="runAI()" disabled>AI로 회의록 만들기</button>
  </div>

  <!-- 직접입력 fallback -->
  <div class="card">
    <h2>또는 직접 입력</h2>
    <p class="sub" style="margin-bottom:10px">음성인식이 안 될 때 회의 내용을 직접 붙여넣으세요</p>
    <textarea id="manualText" rows="5" placeholder="회의 내용을 자유롭게 입력하세요..."></textarea>
    <button class="btn-main" onclick="runAImanual()">AI로 회의록 만들기</button>
  </div>

  <!-- 로딩 -->
  <div class="card" id="loadCard" style="display:none">
    <div style="text-align:center;padding:12px">
      <div class="spinner"></div>
      <p style="color:#888;font-size:14px">AI가 회의 내용을 분석 중...</p>
    </div>
  </div>

  <!-- 편집 -->
  <div class="card" id="editCard" style="display:none">
    <h2>회의록 편집 <span class="badge" id="langBadge"></span></h2>
    <div class="section-group">
      <label>회의 목적</label>
      <textarea id="purpose" rows="2"></textarea>
    </div>
    <div class="section-group">
      <label>주요 논의 내용</label>
      <textarea id="discussion" rows="5"></textarea>
    </div>
    <div class="section-group">
      <label>결정 사항</label>
      <textarea id="decisions" rows="3"></textarea>
    </div>
    <div class="section-group">
      <label>Action Items</label>
      <div id="actionList"></div>
      <button class="btn-ghost" onclick="addAction()">+ Action Item 추가</button>
    </div>
    <div class="section-group">
      <label>다음 회의 일정</label>
      <input type="text" id="nextMeeting" placeholder="예: 2025년 4월 5일 14:00">
    </div>
  </div>

  <!-- 내보내기 -->
  <div class="card" id="exportCard" style="display:none">
    <h2>내보내기</h2>
    <button class="btn-pdf" onclick="exportPDF()">PDF로 저장하기</button>
    <button class="btn-kakao" onclick="shareKakao()">카카오톡으로 공유하기</button>
  </div>

</div>
<div class="toast" id="toast"></div>
<script>
/* ── 날짜 ── */
const today = new Date();
document.getElementById('meetingDate').textContent =
  today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

/* ── 녹음 + STT 통합 ── */
let mediaRecorder, audioChunks=[], recInterval, recSecs=0, recRunning=false;
let recognition=null, sttRunning=false;
let finalText='', interimText='';

function pad(n){return String(n).padStart(2,'0')}

async function toggleRec(){
  if(!recRunning) await startRec(); else stopRec();
}

async function startRec(){
  // 1) 마이크 스트림
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    showToast('마이크 권한이 필요합니다');
    return;
  }

  // 2) MediaRecorder (오디오 파일 저장)
  audioChunks=[];
  const mime = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']
    .find(t=>MediaRecorder.isTypeSupported(t))||'';
  mediaRecorder = new MediaRecorder(stream, mime?{mimeType:mime}:{});
  mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data); };
  mediaRecorder.onstop = ()=>{
    const blob = new Blob(audioChunks,{type: mediaRecorder.mimeType||'audio/webm'});
    document.getElementById('audioEl').src = URL.createObjectURL(blob);
    document.getElementById('audioWrap').style.display='block';
    stream.getTracks().forEach(t=>t.stop());
  };
  mediaRecorder.start(500);

  // 3) Web Speech API (실시간 텍스트)
  finalText=''; interimText='';
  startSTT();

  // 4) UI
  recRunning=true; recSecs=0;
  const btn=document.getElementById('recBtn');
  btn.classList.add('on'); btn.innerHTML='&#9632;';
  document.getElementById('recLabel').textContent='녹음 중... (버튼을 눌러 중지)';
  document.getElementById('liveBox').classList.add('active');
  document.getElementById('stepHint').textContent='말씀하세요. 텍스트가 실시간으로 변환됩니다.';
  recInterval=setInterval(()=>{
    recSecs++;
    document.getElementById('recTimer').textContent=pad(Math.floor(recSecs/60))+':'+pad(recSecs%60);
  },1000);
}

function stopRec(){
  // 1) MediaRecorder 중지
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  // 2) STT 중지
  stopSTT();
  // 3) UI
  recRunning=false;
  clearInterval(recInterval);
  const btn=document.getElementById('recBtn');
  btn.classList.remove('on'); btn.innerHTML='&#9679;';
  document.getElementById('recLabel').textContent='녹음 완료';
  document.getElementById('liveBox').classList.remove('active');
  // 4) AI 버튼 활성화
  const hasText = finalText.trim().length > 0;
  document.getElementById('aiBtn').disabled = !hasText;
  document.getElementById('stepHint').textContent = hasText
    ? '"AI로 회의록 만들기" 버튼을 누르세요!'
    : '텍스트가 인식되지 않았습니다. 아래 직접 입력을 이용해주세요.';
}

/* ── Web Speech API ── */
function startSTT(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('이 브라우저는 음성인식을 지원하지 않습니다'); return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = detectLang();
  recognition.onresult = e=>{
    interimText='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interimText += e.results[i][0].transcript;
    }
    renderLiveBox();
  };
  recognition.onerror = ev=>{
    if(ev.error==='no-speech') return; // 무시
    showToast('음성인식 오류: '+ev.error);
  };
  recognition.onend = ()=>{ if(recRunning) recognition.start(); }; // 자동 재시작
  recognition.start();
  sttRunning=true;
  document.getElementById('sttState').textContent='● 인식 중';
  document.getElementById('sttState').style.color='#e74c3c';
}

function stopSTT(){
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  sttRunning=false;
  document.getElementById('sttState').textContent='';
}

function detectLang(){
  // 브라우저 언어로 초기값, 자동 감지 지원
  const l = navigator.language||'ko-KR';
  return l.startsWith('en') ? 'en-US' : 'ko-KR';
}

function renderLiveBox(){
  const box = document.getElementById('liveBox');
  box.innerHTML = finalText +
    (interimText ? `<span class="interim">${interimText}</span>` : '');
}

/* ── AI 구조화 ── */
async function runAI(){
  const text = finalText.trim();
  if(!text){ showToast('인식된 텍스트가 없습니다'); return; }
  await callClaude(text);
}

async function runAImanual(){
  const text = document.getElementById('manualText').value.trim();
  if(!text){ showToast('내용을 입력해주세요'); return; }
  await callClaude(text);
}

async function callClaude(rawText){
  const title = document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date  = document.getElementById('meetingDate').textContent;
  const att   = document.getElementById('attendees').value||'';

  document.getElementById('loadCard').style.display='block';
  document.getElementById('editCard').style.display='none';
  document.getElementById('exportCard').style.display='none';

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        messages:[{role:'user', content:
`You are a professional meeting minutes assistant. Structure the raw meeting transcript below.

Meeting info:
- Title: ${title}
- Date: ${date}
- Attendees: ${att||'(not specified)'}

Raw transcript:
${rawText}

Respond ONLY in valid JSON (no markdown fences, no extra text):
{
  "language": "Korean or English",
  "purpose": "...",
  "discussion": "...",
  "decisions": "...",
  "actions": [{"task":"...","owner":"...","due":"..."}],
  "nextMeeting": "..."
}

Use the same language as the transcript. Be concise and professional.`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content?.find(b=>b.type==='text')?.text||'';
    let p;
    try{ p=JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch{ p={language:'Korean',purpose:'',discussion:raw,decisions:'',actions:[],nextMeeting:''}; }

    fillForm(p);
    document.getElementById('loadCard').style.display='none';
    document.getElementById('editCard').style.display='block';
    document.getElementById('exportCard').style.display='block';
    showToast('회의록이 생성됐습니다! 내용을 확인하세요.');
  }catch(e){
    document.getElementById('loadCard').style.display='none';
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  }
}

function fillForm(p){
  const isEn = (p.language||'').toLowerCase().includes('en');
  const badge = document.getElementById('langBadge');
  badge.textContent = isEn ? 'English' : '한국어';
  badge.className = 'badge '+(isEn?'badge-en':'badge-ko');
  document.getElementById('purpose').value    = p.purpose||'';
  document.getElementById('discussion').value = p.discussion||'';
  document.getElementById('decisions').value  = p.decisions||'';
  document.getElementById('nextMeeting').value= p.nextMeeting||'';
  const list = document.getElementById('actionList');
  list.innerHTML='';
  const acts = p.actions||[];
  if(!acts.length) acts.push({task:'',owner:'',due:''});
  acts.forEach(a=>{
    const val=[a.task,a.owner?`(${a.owner})`:'',a.due?`→ ${a.due}`:''].filter(Boolean).join(' ');
    addAction(val);
  });
}

/* ── Action Items ── */
function addAction(val=''){
  const d=document.createElement('div');
  d.className='action-row';
  d.innerHTML=`<input type="text" placeholder="내용 | 담당자 | 기한" value="${val.replace(/"/g,'&quot;')}"><button class="del-btn" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('actionList').appendChild(d);
}

/* ── PDF ── */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const title    =document.getElementById('meetingTitle').value||'TS LT Meeting';
  const date     =document.getElementById('meetingDate').textContent;
  const att      =document.getElementById('attendees').value||'—';
  const purpose  =document.getElementById('purpose').value||'—';
  const discussion=document.getElementById('discussion').value||'—';
  const decisions=document.getElementById('decisions').value||'—';
  const nextMeet =document.getElementById('nextMeeting').value||'—';
  const actions  =Array.from(document.querySelectorAll('#actionList input')).map(i=>i.value).filter(Boolean);

  const M=20,W=210,U=W-M*2;
  let y=M;

  // 헤더
  doc.setFillColor(44,62,80);
  doc.rect(0,0,210,36,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text(title,M,15);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(date,M,23);
  doc.text('Attendees: '+att,M,30);
  y=44;

  function section(heading,content){
    if(y>264){doc.addPage();y=M;}
    doc.setFillColor(240,242,245);
    doc.rect(M,y,U,8,'F');
    doc.setTextColor(44,62,80);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(heading,M+3,y+5.5);
    y+=11;
    doc.setTextColor(50,50,50);doc.setFontSize(9.5);doc.setFont('helvetica','normal');
    doc.splitTextToSize(content,U-4).forEach(l=>{
      if(y>278){doc.addPage();y=M;}
      doc.text(l,M+3,y);y+=5.2;
    });
    y+=4;
  }

  section('Meeting Purpose',purpose);
  section('Key Discussion',discussion);
  section('Decisions',decisions);
  section('Action Items',actions.length?actions.map((a,i)=>`${i+1}. ${a}`).join('\n'):'—');
  section('Next Meeting',nextMeet);
  doc.setTextColor(190,190,190);doc.setFontSize(8);
  doc.text('Generated by Meeting Minutes Tool',M,290);

  doc.save(title.replace(/\s+/g,'_')+'_minutes.pdf');
  showToast('PDF 저장 완료!');
}

function shareKakao(){
  exportPDF();
  setTimeout(()=>{
    const title=document.getElementById('meetingTitle').value||'TS LT Meeting';
    if(navigator.share){
      navigator.share({
        title:title+' Meeting Minutes',
        text:`[${title}] 회의록\n날짜: ${document.getElementById('meetingDate').textContent}\n참석자: ${document.getElementById('attendees').value||'—'}`
      }).catch(()=>showToast('PDF 저장 후 카카오톡에서 직접 공유하세요.'));
    }else{
      showToast('PDF 저장 완료! 카카오톡에서 파일을 공유하세요.');
    }
  },600);
}

/* ── Toast ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
